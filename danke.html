<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Danke · The Miracle Wardrobe</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #eee7da; color: #444443;
    font-family: 'Montserrat', sans-serif; font-weight: 300;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .card {
    background: #fffef3; border-radius: 22px; padding: 56px 44px; max-width: 560px;
  }
  .label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.55; margin-bottom: 20px; }
  h1 { font-size: 26px; font-weight: 400; line-height: 1.4; margin-bottom: 18px; }
  p { font-size: 15px; line-height: 1.7; opacity: 0.85; margin-bottom: 12px; }
  .accent { display: inline-block; background: #fad7cb; border-radius: 20px; padding: 8px 20px; font-size: 13px; margin-top: 18px; }
  a { color: #444443; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">The Miracle Wardrobe</div>
    <h1>Deine Buchung ist da. Schön, dass du dabei bist.</h1>
    <p>In den nächsten Minuten landet eine E-Mail mit deinem Zugang bei dir. Schau auch im Spam-Ordner nach, falls sie sich versteckt.</p>
    <p>Fragen? Schreib mir an <a href="mailto:hello@minimalismuse.de">hello@minimalismuse.de</a>.</p>
    <span class="accent">Ein Ankommen.</span>
  </div>
  <script src="/track.js" defer></script>
  <script>window.addEventListener('load', function () { if (window.mwTrack) window.mwTrack('purchase'); });</script>
</body>
</html>
